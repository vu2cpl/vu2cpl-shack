<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">

  <!-- Defeat PWA / dock-icon HTML caching. Without these, Safari
       caches index.html on first launch and never re-fetches it,
       even when the underlying file on the Pi changes — so ?v=N
       bumps on subresources never take effect. iOS home-screen
       PWAs and macOS Sonoma "Add to Dock" webviews are especially
       sticky. These headers force a revalidate on every open. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>VU2CPL Shack</title>

  <!-- Favicon (browser tab) — order matters: most-compatible first.
       Safari prefers .ico when present (it's the legacy fallback for
       sites that don't ship modern link tags). Then PNG by size hint.
       SVG last as the future-proof scalable variant.
       The ?v=N suffix forces a cache-bypass when the icon is updated. -->
  <link rel="shortcut icon" href="./favicon.ico?v=4">
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=4">
  <link rel="icon" type="image/png" sizes="16x16"  href="./favicon-16.png?v=4">
  <link rel="icon" type="image/png" sizes="32x32"  href="./favicon-32.png?v=4">
  <link rel="icon" type="image/png" sizes="48x48"  href="./favicon-48.png?v=4">
  <link rel="icon" type="image/svg+xml" sizes="any" href="./icon.svg?v=4">
  <!-- Safari macOS tinted "mask" icon for pinned tabs -->
  <link rel="mask-icon" href="./icon.svg?v=4" color="#1f6feb">

  <!-- iOS home-screen icon (iPad / iPhone "Add to Home Screen") -->
  <link rel="apple-touch-icon" href="./apple-touch-icon-180.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png?v=4">

  <!-- iOS PWA title shown under the home-screen icon -->
  <meta name="apple-mobile-web-app-title" content="Shack">

  <link rel="stylesheet" href="./index.css?v=4">
  <link rel="manifest" href="./manifest.json?v=2">

  <!-- uibuilder library (must come BEFORE Vue + our app) -->
  <script defer src="../uibuilder/uibuilder.iife.min.js"></script>
  <!-- Vue 3 (self-hosted to remove external CDN dependency) -->
  <script defer src="./vue.global.prod.js"></script>
  <!-- Our app (loaded after uibuilder + Vue thanks to `defer`).
       Cache-buster bumps with every JS change so the browser
       re-fetches even when no-cache headers are stripped by a
       proxy or PWA cache. -->
  <script defer src="./index.js?v=12"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
