<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background: rounded square, GitHub-dark theme -->
  <rect width="180" height="180" rx="36" ry="36" fill="#0d1117"/>

  <!-- Subtle accent border -->
  <rect x="3" y="3" width="174" height="174" rx="34" ry="34"
        fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.4"/>

  <!-- Antenna / signal arcs (above callsign) -->
  <g fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M 60 70 Q 90 50 120 70"/>
    <path d="M 50 80 Q 90 40 130 80"/>
    <path d="M 40 90 Q 90 30 140 90"/>
  </g>

  <!-- Antenna mast (center vertical line) -->
  <line x1="90" y1="50" x2="90" y2="98" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna base/feed dot -->
  <circle cx="90" cy="98" r="4" fill="#1f6feb"/>

  <!-- Callsign text -->
  <text x="90" y="138" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="36" font-weight="800" fill="#c9d1d9"
        letter-spacing="0.5">VU2CPL</text>

  <!-- SHACK subtitle -->
  <text x="90" y="160" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#1f6feb"
        letter-spacing="4">SHACK</text>
</svg>
